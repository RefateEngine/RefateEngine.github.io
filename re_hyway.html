<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>re_hyway Event Tree Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e1e; color: #d4d4d4; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; background: #252526; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h1 { color: #569cd6; font-size: 1.5rem; margin-top: 0; }
        p { font-size: 0.9rem; color: #cccccc; }
        textarea { width: 100%; height: 300px; background: #1e1e1e; color: #d4d4d4; border: 1px solid #3c3c3c; padding: 1rem; font-family: monospace; font-size: 14px; border-radius: 4px; box-sizing: border-box; resize: vertical; }
        textarea:focus { outline: none; border-color: #007acc; }
        button { background: #007acc; color: white; border: none; padding: 10px 20px; font-size: 1rem; border-radius: 4px; cursor: pointer; margin-top: 1rem; width: 100%; font-weight: bold; }
        button:hover { background: #005f9e; }
        .alert { color: #ce9178; font-size: 0.85rem; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>re_hyway: Event Tree Generator</h1>
        <p><code>event_tree/meta.txt</code> の内容（JSON配列）、または新規の配列を以下にペーストしてください。<br>※IDをズラしたくない場合は、削除するパスを <code>null</code> に置き換えて欠番にしてください。</p>
        
        <textarea id="jsonInput">[
  "mymap:skill/fire",
  "mymap:skill/ice",
  null,
  "mymap:boss/spawn"
]</textarea>
        <div class="alert">※ 生成された「event_tree.zip」を解凍し、既存の event_tree フォルダに上書きしてください。</div>
        
        <button onclick="generateZip()">イベントツリー (ZIP) を生成</button>
    </div>

    <script>
        async function generateZip() {
            const inputStr = document.getElementById("jsonInput").value;
            let eventPaths;
            try {
                eventPaths = JSON.parse(inputStr);
                if (!Array.isArray(eventPaths)) throw new Error("配列ではありません");
            } catch (e) {
                alert("JSONの形式が間違っています。\n[\"path1\", \"path2\"] のような配列形式にしてください。");
                return;
            }

            const zip = new JSZip();
            const namespace = "re_hyway";
            
            // meta.txt の保存
            zip.file(`meta.txt`, JSON.stringify(eventPaths, null, 2));

            const p2iFolder = zip.folder(`p2i`);
            const i2pFolder = zip.folder(`i2p`);
            const validEvents = [];

            // p2iの生成と有効イベント抽出
            eventPaths.forEach((path, index) => {
                if (!path) return;
                const eventId = index + 1;
                validEvents.push({ id: eventId, path: path });
                p2iFolder.file(`${path}.mcfunction`, `scoreboard players set @s ${namespace}.eventId ${eventId}`);
            });

            // i2p (二分探索ツリー) の生成ロジック
            function buildTree(events, folderName = "") {
                if (events.length === 0) return;
                if (events.length === 1) {
                    i2pFolder.file(`leaf_${events[0].id}.mcfunction`, `function ${events[0].path}`);
                    return;
                }

                const midIndex = Math.floor(events.length / 2);
                const leftHalf = events.slice(0, midIndex);
                const rightHalf = events.slice(midIndex);

                const minId = events[0].id;
                const maxId = events[events.length - 1].id;
                const midId = leftHalf[leftHalf.length - 1].id;

                let nodeContent = "";
                if (leftHalf.length === 1) {
                    nodeContent += `execute if score @s ${namespace}.eventId matches ${leftHalf[0].id} run function ${namespace}:event_tree/i2p/leaf_${leftHalf[0].id}\n`;
                } else {
                    nodeContent += `execute if score @s ${namespace}.eventId matches ${minId}..${midId} run function ${namespace}:event_tree/i2p/node_${minId}_${midId}\n`;
                    buildTree(leftHalf);
                }

                if (rightHalf.length === 1) {
                    nodeContent += `execute if score @s ${namespace}.eventId matches ${rightHalf[0].id} run function ${namespace}:event_tree/i2p/leaf_${rightHalf[0].id}\n`;
                } else {
                    nodeContent += `execute if score @s ${namespace}.eventId matches ${midId + 1}..${maxId} run function ${namespace}:event_tree/i2p/node_${midId + 1}_${maxId}\n`;
                    buildTree(rightHalf);
                }

                const fileName = folderName || `node_${minId}_${maxId}`;
                i2pFolder.file(`${fileName}.mcfunction`, nodeContent);
            }

            if (validEvents.length > 0) buildTree(validEvents, "root");

            // ZIP出力処理
            const blob = await zip.generateAsync({ type: "blob" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "event_tree.zip";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
